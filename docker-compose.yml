version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: giliza-postgres
    environment:
      POSTGRES_DB: giliza_db
      POSTGRES_USER: giliza_user
      POSTGRES_PASSWORD: giliza_password_secure
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giliza_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - giliza-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: giliza-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - giliza-network

  # Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: giliza-backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://giliza_user:giliza_password_secure@postgres:5432/giliza_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - giliza-network

  # Python FastAPI AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: giliza-ai
    environment:
      PYTHONUNBUFFERED: 1
      API_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
      - ./ai-service/models:/app/models
    networks:
      - giliza-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: giliza-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_AI_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - giliza-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: giliza-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - giliza-network

volumes:
  postgres_data:
  redis_data:

networks:
  giliza-network:
    driver: bridge
